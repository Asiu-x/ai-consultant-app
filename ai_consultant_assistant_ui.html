<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consultant Terminal</title>
    <!-- Google Fonts for Editorial Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: {
                            100: '#ffffff',
                            200: '#fafafa',
                            300: '#f5f5f5',
                            400: '#e5e5e5',
                            500: '#d4d4d4',
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: {
                            DEFAULT: '#4338ca', // Indigo-700
                            muted: '#e0e7ff',   // Indigo-100
                        },
                        highlight: {
                            DEFAULT: '#fbbf24', // Amber-400
                            muted: '#fef3c7',   // Amber-100
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'popover': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        scanLine: {
                            '0%': { transform: 'translateY(-100%)' },
                            '50%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(-100%)' }
                        },
                        pulseRings: {
                            '0%': { transform: 'scale(0.8)', opacity: '0.8' },
                            '100%': { transform: 'scale(2)', opacity: '0' }
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scan-line': 'scanLine 3s ease-in-out infinite',
                        'pulse-rings': 'pulseRings 2s cubic-bezier(0.4, 0, 0.6, 1) infinite'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        /* Custom scrollbar and subtle patterns */
        body {
            background-color: #fafafa;
            background-image: radial-gradient(#e5e5e5 1px, transparent 0);
            background-size: 20px 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a3a3a3;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body class="text-base-900 font-sans h-screen w-screen overflow-hidden flex justify-center items-center">
    <div id="root" class="h-full w-full max-w-7xl relative flex gap-6"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration — relative path works for both local and cloud deployment
        const API_ENDPOINT = '/api/analyze';

        // --- Component: Global Navbar ---
        function Navbar() {
            return (
                <nav className="w-full px-8 py-4 flex justify-between items-center border-b border-base-400/30 bg-white/60 backdrop-blur-md z-50 shrink-0">
                    <div className="flex items-center gap-3">
                        <div className="w-8 h-8 rounded-lg bg-accent flex items-center justify-center text-white font-bold text-lg italic shadow-sm">A</div>
                        <span className="text-base-900 font-bold tracking-tight">AI 顾问助手</span>
                    </div>

                    {/* Version Preview Trigger (Hover Target) */}
                    <div className="relative group cursor-pointer">
                        <div className="flex items-center gap-2 px-3 py-1.5 rounded-full border border-base-400/50 hover:border-accent hover:bg-accent/5 transition-all duration-300">
                            <span className="relative flex h-2 w-2">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-accent"></span>
                            </span>
                            <span className="text-[11px] font-bold text-base-800 uppercase tracking-wider">版本预告</span>
                        </div>

                        {/* Floating Popover (Group Hover) */}
                        <div className="absolute right-0 top-full pt-4 opacity-0 scale-95 pointer-events-none group-hover:opacity-100 group-hover:scale-100 group-hover:pointer-events-auto transition-all duration-300 z-[100] transform origin-top-right">
                            <div className="w-[480px] glass-panel rounded-2xl border-l-4 border-l-accent overflow-hidden shadow-popover p-7 text-left">
                                <div className="absolute -right-24 -top-24 w-64 h-64 bg-accent/5 rounded-full blur-3xl group-hover:bg-accent/10 transition-all duration-700"></div>

                                <div className="flex justify-between items-start mb-6">
                                    <div>
                                        <div className="flex items-center gap-2 mb-2">
                                            <span className="px-2 py-0.5 bg-accent/10 text-accent text-[9px] font-bold uppercase tracking-wider rounded">Pipeline v2.0</span>
                                            <span className="text-[10px] font-mono text-base-400 uppercase tracking-widest leading-none">即将接入（可能遥遥无期～）</span>
                                        </div>
                                        <h3 className="text-lg font-bold tracking-tight text-base-900 leading-none">AI 顾问智能知识库集成</h3>
                                    </div>
                                    <i className="ph-duotone ph-rocket-launch text-3xl text-accent opacity-40"></i>
                                </div>

                                <div className="grid grid-cols-1 gap-4 mb-6 relative z-10">
                                    <div className="flex items-start gap-4 p-3 rounded-xl hover:bg-white/50 transition-colors border border-transparent hover:border-base-200">
                                        <div className="w-8 h-8 rounded bg-accent/5 flex items-center justify-center shrink-0">
                                            <i className="ph-duotone ph-blueprint text-lg text-accent"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-xs font-bold text-base-800">内部标品库</h4>
                                            <p className="text-[10px] text-base-500 leading-normal">实时对标产品参数与定价逻辑，确保方案严谨合规。</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4 p-3 rounded-xl hover:bg-white/50 transition-colors border border-transparent hover:border-base-200">
                                        <div className="w-8 h-8 rounded bg-accent/5 flex items-center justify-center shrink-0">
                                            <i className="ph-duotone ph-layout text-lg text-accent"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-xs font-bold text-base-800">标准方案库</h4>
                                            <p className="text-[10px] text-base-500 leading-normal">集成专家级落地方案，一键生成高质量方案初稿。</p>
                                        </div>
                                    </div>
                                    <div className="flex items-start gap-4 p-3 rounded-xl hover:bg-white/50 transition-colors border border-transparent hover:border-base-200">
                                        <div className="w-8 h-8 rounded bg-accent/5 flex items-center justify-center shrink-0">
                                            <i className="ph-duotone ph-seal-check text-lg text-accent"></i>
                                        </div>
                                        <div>
                                            <h4 className="text-xs font-bold text-base-800">成功案例库</h4>
                                            <p className="text-[10px] text-base-500 leading-normal">沉淀历史标杆项目，辅助 AI 实现经验的自动化复用。</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="pt-4 border-t border-base-200 flex justify-between items-center text-[9px] font-bold text-base-800 uppercase tracking-wider">
                                    <div className="flex items-center gap-1.5"><i className="ph-bold ph-lightning text-highlight"></i> 自动精准对标</div>
                                    <div className="flex items-center gap-1.5"><i className="ph-bold ph-recycle text-green-600"></i> 方案无损复用</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        }

        // --- Component: Global Footer ---
        function Footer() {
            return (
                <footer className="w-full px-8 py-3 border-t border-base-400/30 bg-white/20 backdrop-blur-sm shrink-0">
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
                        <div className="flex items-center gap-2">
                            <span className="text-[9px] font-mono text-base-400 uppercase tracking-widest">联系人</span>
                            <p className="text-xs font-semibold text-base-800 tracking-tight">项绍栋 sdxiang2</p>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[9px] font-mono text-base-400 uppercase tracking-widest">所属部门</span>
                            <p className="text-xs font-medium text-base-500 tracking-tight">教育高教产品线 AI 教学产品部</p>
                        </div>
                        <div className="text-[9px] text-base-300 uppercase tracking-[0.2em]">&copy; 2026 AI CONSULTANT APP</div>
                    </div>
                </footer>
            );
        }

        // --- Component: Sidebar Input ---
        function InputTerminal({ inputState, setInputState, onAnalyze, isThinking }) {
            return (
                <div className="w-1/3 min-w-[320px] max-w-[400px] h-full flex flex-col z-10 glass-panel rounded-2xl shadow-soft overflow-hidden">
                    {/* Header */}
                    <div className="p-6 border-b border-base-400/50 flex flex-col gap-1">
                        <div className="flex justify-between items-center mb-1">
                            <span className="text-[10px] font-mono text-base-500 uppercase tracking-widest">工作空间</span>
                            <span className="flex h-2 w-2 relative">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-accent"></span>
                            </span>
                        </div>
                        <h1 className="text-xl font-medium tracking-tight">AI顾问 <span className="font-light text-base-500">工作台</span></h1>
                    </div>

                    {/* Input Area */}
                    <div className="flex-1 flex flex-col p-6 gap-4">
                        <label className="text-sm font-semibold text-base-800 tracking-wide flex items-center gap-2">
                            <i className="ph-bold ph-text-align-left text-base-500"></i>
                            客户原始业务需求
                        </label>
                        <textarea
                            className="w-full flex-1 p-0 bg-transparent border-0 rounded-none focus:ring-0 resize-none outline-none text-base leading-relaxed placeholder-base-500"
                            placeholder="请在此输入客户的原始业务需求记录。引擎将自动切分原子级功能，并划定大模型技术边界..."
                            value={inputState}
                            onChange={(e) => setInputState(e.target.value)}
                        ></textarea>
                    </div>

                    {/* Action Bar */}
                    <div className="p-4 bg-white/50 border-t border-base-400/50">
                        <button
                            onClick={onAnalyze}
                            disabled={isThinking}
                            className={`w-full group relative flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-medium transition-all duration-300
                                ${isThinking
                                    ? 'bg-base-200 text-base-500 cursor-not-allowed'
                                    : 'bg-base-900 text-white hover:bg-base-800 hover:shadow-floating shadow-md active:scale-[0.98]'
                                }`}
                        >
                            {isThinking ? (
                                <>
                                    <i className="ph-bold ph-circle-notch animate-spin text-lg"></i>
                                    正在深度推演...
                                </>
                            ) : (
                                <>
                                    <span>启动智能拆解</span>
                                    <i className="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                </>
                            )}
                        </button>
                    </div>
                </div>
            );
        }

        // --- Component: Empty State ---
        function EmptyState() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center text-base-500 animate-slide-up">
                    <div className="h-24 w-24 border border-base-400 rounded-full flex items-center justify-center mb-6 bg-white/50 shadow-sm relative overflow-hidden">
                        <i className="ph-thin ph-aperture text-4xl"></i>
                    </div>
                    <h3 className="text-lg font-medium text-base-800 mb-2">等待业务需求输入</h3>
                    <p className="text-sm max-w-sm text-center leading-relaxed">
                        请输入客户侧原始需求，启动原子化结构拆解与能力边界评估引擎。
                    </p>
                </div>
            );
        }

        // --- Component: Error State ---
        function ErrorState({ message }) {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center animate-slide-up px-8">
                    <div className="text-left w-full max-w-lg">
                        <div className="flex items-center gap-3 mb-4 text-red-600">
                            <i className="ph-fill ph-warning-octagon text-3xl"></i>
                            <h3 className="text-xl font-medium tracking-tight">推演进程异常中止</h3>
                        </div>
                        <div className="bg-red-50 border border-red-100 p-5 rounded-xl">
                            <p className="text-sm text-red-900 font-mono break-words">{message}</p>
                        </div>
                        <p className="text-xs text-base-500 mt-4">请检查本地后端终端日志，获取详细的大模型接口报错追踪信息。</p>
                    </div>
                </div>
            );
        }

        // --- Component: Thinking State ---
        function ThinkingState() {
            const steps = ['解析客户意图...', '切分原子功能点...', '评估能力边界...', '生成技术方案...'];
            const [stepIdx, setStepIdx] = React.useState(0);
            React.useEffect(() => {
                const t = setInterval(() => setStepIdx(i => (i + 1) % steps.length), 2000);
                return () => clearInterval(t);
            }, []);
            return (
                <div className="h-full w-full flex flex-col items-center justify-center text-base-800 animate-slide-up gap-12">
                    {/* Breathing Orb with Ripple Rings */}
                    <div className="relative flex items-center justify-center w-48 h-48">
                        <div className="absolute w-48 h-48 rounded-full border border-accent/10 animate-ping" style={{ animationDuration: '2.4s' }}></div>
                        <div className="absolute w-36 h-36 rounded-full border border-accent/15 animate-ping" style={{ animationDuration: '2s', animationDelay: '0.4s' }}></div>
                        <div className="absolute w-24 h-24 rounded-full border border-accent/20 animate-ping" style={{ animationDuration: '1.6s', animationDelay: '0.8s' }}></div>
                        {/* Core */}
                        <div className="w-14 h-14 rounded-full bg-accent shadow-[0_0_40px_rgba(67,56,202,0.4)] animate-pulse flex items-center justify-center">
                            <i className="ph-fill ph-sparkle text-white text-2xl"></i>
                        </div>
                    </div>

                    {/* Text Block */}
                    <div className="text-center space-y-2">
                        <h3 className="text-2xl font-light tracking-tight text-base-900">AI 正在深度思考</h3>
                        <p key={stepIdx} className="text-sm text-base-400 font-mono animate-slide-up">{steps[stepIdx]}</p>
                    </div>

                    {/* Step Pill Progress */}
                    <div className="flex gap-2 items-center">
                        {steps.map((_, i) => (
                            <div key={i} className={`h-1 rounded-full transition-all duration-700 ${i === stepIdx ? 'w-8 bg-accent' : i < stepIdx ? 'w-2 bg-accent/40' : 'w-2 bg-base-300'}`}></div>
                        ))}
                    </div>
                </div>
            );
        }


        // --- Component: Result Card ---
        function ArchitectureCard({ feature, index }) {
            const isLLM = feature.type && feature.type.includes('大模型');

            return (
                <div className={`bg-white border rounded-xl overflow-hidden shadow-sm hover:shadow-floating transition-all duration-300 mb-6 ${isLLM ? 'border-l-4 border-l-accent border-base-300' : 'border-l-4 border-l-base-800 border-base-300'}`}>
                    {/* Card Header */}
                    <div className="px-6 py-5 border-b border-base-300 flex justify-between items-center bg-base-200">
                        <div className="flex items-center gap-3">
                            <span className="font-mono text-sm text-base-400 font-medium tabular-nums">#{String(index + 1).padStart(2, '0')}</span>
                            <h4 className="text-lg font-semibold text-base-900 tracking-tight">{feature.name}</h4>
                        </div>
                        <span className={`px-3 py-1.5 text-xs font-mono tracking-wider rounded-full uppercase ${isLLM ? 'bg-accent text-white' : 'bg-base-900 text-white'}`}>
                            {feature.type}
                        </span>
                    </div>

                    {/* Card Body */}
                    <div className="flex flex-col divide-y divide-base-300">

                        {/* Row 1: Engineering — white bg */}
                        <div className="p-6 bg-white">
                            <div className="flex items-center gap-2.5 mb-5 pb-3 border-b border-base-200">
                                <i className="ph-bold ph-hard-drives text-base-700 text-lg"></i>
                                <h5 className="text-sm font-bold uppercase tracking-widest text-base-700">工程支撑层</h5>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-base-100 rounded-lg p-4 border border-base-200">
                                    <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-base-600 shrink-0"></span>架构与方案设计
                                    </h6>
                                    <p className="text-base text-base-700 leading-relaxed">{feature.engineering.architecture}</p>
                                </div>
                                <div className="bg-base-100 rounded-lg p-4 border border-base-200">
                                    <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-base-600 shrink-0"></span>数据需求应用
                                    </h6>
                                    <p className="text-base text-base-700 leading-relaxed">{feature.engineering.data_requirements}</p>
                                </div>
                            </div>
                        </div>

                        {/* Row 2: LLM — soft blue-tint bg */}
                        {isLLM && feature.llm && (
                            <div className="p-6 bg-[#f5f3ff]">
                                <div className="flex items-center gap-2.5 mb-5 pb-3 border-b border-accent/20">
                                    <i className="ph-bold ph-brain text-accent text-lg"></i>
                                    <h5 className="text-sm font-bold uppercase tracking-widest text-accent">AI 智能应用层</h5>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/70 rounded-lg p-4 border border-accent/20">
                                        <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>提示词策略与预期效果
                                        </h6>
                                        <p className="text-base text-base-700 leading-relaxed">{feature.llm.prompt_strategy}</p>
                                    </div>
                                    <div className="bg-white/70 rounded-lg p-4 border border-accent/20">
                                        <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>AI能力与知识库支撑
                                        </h6>
                                        <p className="text-base text-base-700 leading-relaxed">{feature.llm.ai_capabilities}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Row 3: Consultant Advice — amber tint bg */}
                        {feature.consultant_advice && (
                            <div className="p-6 bg-amber-50">
                                <div className="flex gap-3.5">
                                    <div className="mt-1 shrink-0">
                                        <i className="ph-fill ph-lightbulb text-amber-500 text-2xl"></i>
                                    </div>
                                    <div>
                                        <h6 className="text-sm font-bold uppercase tracking-widest text-amber-700 mb-2">顾问策略指引</h6>
                                        <p className="text-base text-amber-900 leading-relaxed font-normal">{feature.consultant_advice}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }


        // --- Main App ---
        function App() {
            const [inputState, setInputState] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [currentOutput, setCurrentOutput] = useState(null);
            const [error, setError] = useState(null);

            const handleAnalyze = async () => {
                if (!inputState.trim()) return;
                setIsThinking(true);
                setCurrentOutput(null);
                setError(null);

                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ requirement: inputState })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.detail || `Server error (${response.status})`);
                    }

                    const data = await response.json();
                    setCurrentOutput(data);
                } catch (err) {
                    console.error("Analysis Failed:", err);
                    setError(`Connection failed. Ensure backend runs on port 8000. \nTrace: ${err.message}`);
                } finally {
                    setIsThinking(false);
                }
            };

            return (
                <div className="flex flex-col h-full w-full bg-[#fafafa]">
                    <Navbar />

                    <div id="main-workflow" className="flex-1 flex gap-6 overflow-hidden p-6 lg:p-10 max-w-[1600px] mx-auto w-full">
                        <InputTerminal
                            inputState={inputState}
                            setInputState={setInputState}
                            onAnalyze={handleAnalyze}
                            isThinking={isThinking}
                        />

                        {/* Main Content Area */}
                        <div className="flex-1 h-full overflow-y-auto overflow-x-hidden pr-2 pb-6 scroll-smooth">
                            <div className="min-h-full max-w-5xl mx-auto align-top">

                                {!currentOutput && !isThinking && !error && <EmptyState />}

                                {error && !isThinking && <ErrorState message={error} />}

                                {isThinking && <ThinkingState />}

                                {currentOutput && !isThinking && (
                                    <div className="pt-2 px-2 lg:px-6 animate-slide-up">
                                        <div className="mb-10 pb-4 border-b-2 border-base-900 flex justify-between items-end">
                                            <div>
                                                <h2 className="text-3xl font-medium tracking-tight mb-2">架构智能图谱与拆解报告</h2>
                                                <p className="text-sm font-mono text-base-500 uppercase tracking-widest">System Decomposition Protocol</p>
                                            </div>
                                            <i className="ph-thin ph-stack text-4xl text-base-400"></i>
                                        </div>

                                        <div className="space-y-4">
                                            {currentOutput.features && currentOutput.features.length > 0 ? (
                                                currentOutput.features.map((feature, index) => (
                                                    <ArchitectureCard key={feature.id || index} feature={feature} index={index} />
                                                ))
                                            ) : (
                                                <p className="text-base-500 italic">未能从大模型返回信息中解析到有效特征点。</p>
                                            )}
                                        </div>

                                        {currentOutput.disclaimer && (
                                            <div className="mt-16 pt-6 border-t border-base-300 text-center">
                                                <p className="text-xs font-mono text-base-400 max-w-xl mx-auto">
                                                    <i className="ph-fill ph-warning-circle inline-block mr-1 align-text-bottom"></i>
                                                    {currentOutput.disclaimer}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>

                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
