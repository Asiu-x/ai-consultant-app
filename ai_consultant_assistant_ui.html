<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Consultant Terminal</title>
    <!-- Google Fonts for Editorial Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        base: {
                            100: '#ffffff',
                            200: '#fafafa',
                            300: '#f5f5f5',
                            400: '#737373', // Darkened for better contrast (Zinc-500)
                            500: '#525252', // Darkened for better contrast (Zinc-600)
                            800: '#262626',
                            900: '#171717',
                        },
                        accent: {
                            DEFAULT: '#4338ca', // Indigo-700
                            muted: '#e0e7ff',   // Indigo-100
                        },
                        highlight: {
                            DEFAULT: '#fbbf24', // Amber-400
                            muted: '#fef3c7',   // Amber-100
                        }
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'popover': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        scanLine: {
                            '0%': { transform: 'translateY(-100%)' },
                            '50%': { transform: 'translateY(100%)' },
                            '100%': { transform: 'translateY(-100%)' }
                        },
                        pulseRings: {
                            '0%': { transform: 'scale(0.8)', opacity: '0.8' },
                            '100%': { transform: 'scale(2)', opacity: '0' }
                        },
                        logoGlow: {
                            '0%, 100%': { filter: 'drop-shadow(0 0 5px rgba(67, 56, 202, 0.4))' },
                            '50%': { filter: 'drop-shadow(0 0 15px rgba(67, 56, 202, 0.8))' }
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scan-line': 'scanLine 3s ease-in-out infinite',
                        'pulse-rings': 'pulseRings 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'logo-glow': 'logoGlow 2s ease-in-out infinite'
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Lottie Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        /* Custom scrollbar and subtle patterns */
        body {
            background-color: #fafafa;
            background-image: radial-gradient(#e5e5e5 1px, transparent 0);
            background-size: 20px 20px;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4d4d4;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a3a3a3;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body class="text-base-900 font-sans h-screen w-screen overflow-hidden flex justify-center items-center">
    <div id="root" class="h-full w-full max-w-[1920px] relative flex gap-6"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration — relative path works for both local and cloud deployment, fallback to localhost for file://
        const API_BASE = window.location.protocol === 'file:' ? 'http://127.0.0.1:8000' : '';
        const API_ENDPOINT = `${API_BASE}/api/analyze`;
        const STATUS_ENDPOINT = (taskId) => `${API_BASE}/api/status/${taskId}`;

        // --- Component: Global Navbar ---
        function Navbar() {
            return (
                <nav className="w-full px-12 py-6 flex justify-between items-center border-b border-base-400/20 bg-white/70 backdrop-blur-xl z-50 shrink-0 shadow-sm">
                    <div className="flex items-center gap-6 group cursor-default">
                        <div className="relative">
                            {/* Futuristic Geometric X Design */}
                            <div className="w-12 h-12 rounded-2xl bg-base-900 flex items-center justify-center text-white shadow-2xl transform group-hover:rotate-[360deg] transition-all duration-1000 animate-logo-glow overflow-hidden relative border-t border-white/20">
                                <svg viewBox="0 0 100 100" className="w-8 h-8 relative z-10 fill-none stroke-white stroke-[8] group-hover:stroke-accent transition-colors duration-500">
                                    <path d="M20,20 L80,80 M80,20 L20,80" className="group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" />
                                    <circle cx="50" cy="50" r="10" className="fill-accent opacity-0 group-hover:opacity-100 transition-opacity" />
                                </svg>
                                <div className="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-accent/40 to-transparent"></div>
                                <div className="absolute inset-0 bg-gradient-to-tr from-accent to-purple-400 opacity-0 group-hover:opacity-40 transition-opacity"></div>
                            </div>
                            <div className="absolute -inset-2 bg-accent/20 blur-xl opacity-0 group-hover:opacity-100 rounded-2xl transition-opacity animate-pulse"></div>
                        </div>
                        <div className="flex flex-col">
                            <span className="text-base-900 font-black tracking-tighter text-2xl leading-none italic uppercase">The Consultant <span className="text-accent underline decoration-4 underline-offset-4 decoration-accent/30">X</span></span>
                            <span className="text-[11px] font-mono text-base-500 uppercase tracking-[0.5em] font-bold mt-1 opacity-70">Strategic Intelligence Protocol</span>
                        </div>
                    </div>

                    <div className="flex items-center gap-6">
                        {/* Status Pill */}
                        <div className="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-green-50 border border-green-100">
                            <span className="h-1.5 w-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            <span className="text-[10px] font-bold text-green-700 uppercase tracking-widest">System Active</span>
                        </div>

                        {/* Version Preview Trigger */}
                        <div className="relative group cursor-pointer">
                            <div className="flex items-center gap-2 px-4 py-2 rounded-full border border-base-400/30 hover:border-accent hover:bg-accent/5 transition-all duration-300">
                                <i className="ph-bold ph-rocket-launch text-accent"></i>
                                <span className="text-[11px] font-bold text-base-800 uppercase tracking-wider">未来版本</span>
                            </div>

                            {/* Floating Popover */}
                            <div className="absolute right-0 top-full pt-4 opacity-0 scale-95 pointer-events-none group-hover:opacity-100 group-hover:scale-100 group-hover:pointer-events-auto transition-all duration-300 z-[100] transform origin-top-right">
                                <div className="w-[440px] bg-white rounded-2xl border border-base-200 border-l-4 border-l-accent overflow-hidden shadow-2xl p-7 text-left">
                                    <div className="absolute -right-24 -top-24 w-64 h-64 bg-accent/5 rounded-full blur-3xl"></div>

                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className="px-2 py-0.5 bg-accent/10 text-accent text-[9px] font-bold uppercase tracking-wider rounded">v2.0 Pipeline</span>
                                                <span className="text-[10px] font-mono text-base-400 uppercase tracking-widest leading-none">即将接入</span>
                                            </div>
                                            <h3 className="text-lg font-bold tracking-tight text-base-900 leading-none">AI 顾问智能知识库集成</h3>
                                        </div>
                                        <i className="ph-duotone ph-rocket-launch text-3xl text-accent opacity-40"></i>
                                    </div>

                                    <div className="grid grid-cols-1 gap-4 mb-6 relative z-10">
                                        <div className="flex items-start gap-4 p-3 rounded-xl hover:bg-white/50 transition-colors border border-transparent hover:border-base-200">
                                            <div className="w-8 h-8 rounded bg-accent/10 flex items-center justify-center shrink-0">
                                                <i className="ph-duotone ph-blueprint text-lg text-accent"></i>
                                            </div>
                                            <div>
                                                <h4 className="text-xs font-bold text-base-800">内部标品库</h4>
                                                <p className="text-[10px] text-base-500 leading-normal">实时对标产品参数与定价逻辑，确保方案严谨合规。</p>
                                            </div>
                                        </div>
                                        <div className="flex items-start gap-4 p-3 rounded-xl hover:bg-white/50 transition-colors border border-transparent hover:border-base-200">
                                            <div className="w-8 h-8 rounded bg-accent/10 flex items-center justify-center shrink-0">
                                                <i className="ph-duotone ph-layout text-lg text-accent"></i>
                                            </div>
                                            <div>
                                                <h4 className="text-xs font-bold text-base-800">标准方案库</h4>
                                                <p className="text-[10px] text-base-500 leading-normal">集成专家级落地方案，一键生成高质量方案初稿。</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-base-200 flex justify-between items-center text-[9px] font-bold text-base-800 uppercase tracking-wider">
                                        <div className="flex items-center gap-1.5"><i className="ph-bold ph-lightning text-highlight"></i> 自动精准对标</div>
                                        <div className="flex items-center gap-1.5"><i className="ph-bold ph-recycle text-green-600"></i> 方案无损复用</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </nav>
            );
        }

        // --- Component: Global Footer ---
        function Footer({ onOpenFeedback }) {
            return (
                <footer className="w-full px-8 py-4 border-t border-base-400/20 bg-white/50 shadow-[0_-4px_10px_rgba(0,0,0,0.02)] shrink-0">
                    <div className="max-w-[1600px] mx-auto grid grid-cols-1 md:grid-cols-3 items-center gap-6">
                        {/* Personnel Detail */}
                        <div className="flex flex-col items-center md:items-start group">
                            <span className="text-[9px] font-mono text-base-400 uppercase tracking-widest mb-1">联系人 / CONTACT</span>
                            <div className="flex items-center gap-2">
                                <p className="text-sm font-black text-base-900 tracking-tight italic">项绍栋 <span className="text-accent">sdxiang2</span></p>
                                <span className="h-4 w-px bg-base-300"></span>
                                <button
                                    onClick={onOpenFeedback}
                                    className="relative flex items-center justify-center hover:scale-110 active:scale-95 transition-all text-base-400 hover:text-accent"
                                    title="意见反馈"
                                >
                                    <i className="ph-fill ph-envelope-simple text-lg animate-bounce duration-1000 group-hover:animate-none"></i>
                                    <span className="absolute -top-1 -right-1 w-2 h-2 bg-highlight rounded-full animate-ping opacity-75"></span>
                                </button>
                            </div>
                        </div>

                        {/* Department Info */}
                        <div className="flex flex-col items-center">
                            <span className="text-[9px] font-mono text-base-400 uppercase tracking-widest mb-1">所属部门 / DEPARTMENT</span>
                            <p className="text-sm font-semibold text-base-800 tracking-tight flex items-center gap-2">
                                <i className="ph ph-buildings-light text-accent"></i>
                                教育高教产品线 AI 教学产品部
                            </p>
                        </div>

                        {/* Copyright & Disclaimer */}
                        <div className="flex flex-col items-center md:items-end">
                            <span className="text-[9px] font-mono text-base-400 uppercase tracking-widest mb-1">免责声明 / DISCLAIMER</span>
                            <p className="text-[10px] text-base-500 leading-tight text-right mb-2 font-medium">原则上不承担任何因使用本智能辅助工具而产生的决策后果，请务必视具体商业场景审阅结论。</p>
                            <p className="text-[9px] text-base-400 font-bold uppercase tracking-[0.2em]">&copy; 2026 THE CONSULTANT X. ARCHITECTURE PROTOCOL.</p>
                        </div>
                    </div>
                </footer>
            );
        }

        // --- Component: Sidebar Input ---
        function InputTerminal({ inputState, setInputState, onAnalyze, isThinking }) {
            return (
                <div className="w-1/3 min-w-[320px] max-w-[400px] h-full flex flex-col z-10 glass-panel rounded-2xl shadow-soft overflow-hidden">
                    {/* Header */}
                    <div className="p-6 border-b border-base-400/50 flex flex-col gap-1">
                        <div className="flex justify-between items-center mb-1">
                            <span className="text-[10px] font-mono text-base-500 uppercase tracking-widest">工作空间</span>
                            <span className="flex h-2 w-2 relative">
                                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent opacity-75"></span>
                                <span className="relative inline-flex rounded-full h-2 w-2 bg-accent"></span>
                            </span>
                        </div>
                        <h1 className="text-xl font-medium tracking-tight">AI顾问 <span className="font-light text-base-500">工作台</span></h1>
                    </div>

                    {/* Input Area */}
                    <div className="flex-1 flex flex-col p-6 gap-4">
                        <label className="text-sm font-semibold text-base-800 tracking-wide flex items-center gap-2">
                            <i className="ph-bold ph-text-align-left text-base-500"></i>
                            客户原始业务需求
                        </label>
                        <textarea
                            className="w-full flex-1 p-0 bg-transparent border-0 rounded-none focus:ring-0 resize-none outline-none text-base leading-relaxed placeholder-base-500"
                            placeholder="请在此输入客户的原始业务需求记录。引擎将自动切分原子级功能，并划定大模型技术边界..."
                            value={inputState}
                            onChange={(e) => setInputState(e.target.value)}
                        ></textarea>
                    </div>

                    {/* Action Bar */}
                    <div className="p-4 bg-white/50 border-t border-base-400/50">
                        <button
                            onClick={onAnalyze}
                            disabled={isThinking}
                            className={`w-full group relative flex justify-center items-center gap-2 py-3 px-4 rounded-xl text-sm font-medium transition-all duration-300
                                ${isThinking
                                    ? 'bg-base-200 text-base-500 cursor-not-allowed'
                                    : 'bg-base-900 text-white hover:bg-base-800 hover:shadow-floating shadow-md active:scale-[0.98]'
                                }`}
                        >
                            {isThinking ? (
                                <>
                                    <i className="ph-bold ph-circle-notch animate-spin text-lg"></i>
                                    正在深度推演...
                                </>
                            ) : (
                                <>
                                    <span>启动智能拆解</span>
                                    <i className="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform"></i>
                                </>
                            )}
                        </button>
                    </div>
                </div>
            );
        }

        // --- Component: Empty State (Now acting as Product Intro) ---
        function EmptyState() {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center animate-slide-up px-4 py-8 text-left">
                    <div className="max-w-4xl w-full">
                        {/* Header Section */}
                        <div className="text-center mb-12">
                            <div className="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-accent/10 border border-accent/20 mb-6 font-mono">
                                <i className="ph-fill ph-check-circle text-accent"></i>
                                <span className="text-[11px] font-bold text-accent uppercase tracking-widest">Internal Efficiency Tool</span>
                            </div>
                            <h2 className="text-4xl lg:text-5xl font-black text-base-900 tracking-tighter mb-4 leading-tight">
                                将客户侧原始需求，<br />转化为<span className="text-accent italic underline decoration-4 underline-offset-4 decoration-accent/30">结构化的项目清单。</span>
                            </h2>
                            <p className="text-base-500 font-medium text-base lg:text-lg max-w-2xl mx-auto leading-relaxed mt-6">
                                The Consultant X 是一款内部分析辅助工具，专为售前与产品团队设计。旨在协助快速提炼客户沟通中的非结构化信息，理清功能模块，并评估当前需求中的大模型适用范围与工程接入要求。
                            </p>
                        </div>

                        {/* Features Grid */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* Card 1 */}
                            <div className="glass-panel p-8 rounded-3xl border border-base-200 hover:border-accent/40 transition-all duration-300 group bg-white/60">
                                <div className="w-12 h-12 rounded-xl bg-orange-50 border border-orange-100 flex items-center justify-center mb-6">
                                    <i className="ph-duotone ph-list-numbers text-2xl text-orange-600"></i>
                                </div>
                                <h3 className="text-base font-bold text-base-900 mb-2 tracking-tight">梳理业务场景</h3>
                                <p className="text-sm text-base-500 leading-relaxed font-normal">从会议纪要或痛点收集中，提取具体的业务环节与需要落地的功能模块，辅助明确项目范围。</p>
                            </div>

                            {/* Card 2 */}
                            <div className="glass-panel p-8 rounded-3xl border border-base-200 hover:border-accent/40 transition-all duration-300 group bg-white/60">
                                <div className="w-12 h-12 rounded-xl bg-indigo-50 border border-indigo-100 flex items-center justify-center mb-6">
                                    <i className="ph-duotone ph-intersect text-2xl text-indigo-600"></i>
                                </div>
                                <h3 className="text-base font-bold text-base-900 mb-2 tracking-tight">技术边界判定</h3>
                                <p className="text-sm text-base-500 leading-relaxed font-normal">协助初步评估哪些逻辑适合由模型计算处理，哪些需要依赖现有系统对接，减少初期评审偏差。</p>
                            </div>

                            {/* Card 3 */}
                            <div className="glass-panel p-8 rounded-3xl border border-base-200 hover:border-accent/40 transition-all duration-300 group bg-white/60">
                                <div className="w-12 h-12 rounded-xl bg-emerald-50 border border-emerald-100 flex items-center justify-center mb-6">
                                    <i className="ph-duotone ph-chat-teardrop-text text-2xl text-emerald-600"></i>
                                </div>
                                <h3 className="text-base font-bold text-base-900 mb-2 tracking-tight">参考策略补充</h3>
                                <p className="text-sm text-base-500 leading-relaxed font-normal">提供针对性的业务跟进建议与潜在风险提示，作为进一步对客沟通或编写标准方案时的思路储备。</p>
                            </div>
                        </div>

                        {/* CTA / Hint */}
                        <div className="mt-16 text-center flex items-center justify-center gap-3 text-base-400">
                            <i className="ph-bold ph-arrow-u-down-left text-2xl animate-bounce"></i>
                            <span className="text-sm font-semibold tracking-widest text-base-500">在左侧工作台填入原始需求以启动内容分析</span>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Component: Error State ---
        function ErrorState({ message }) {
            return (
                <div className="h-full w-full flex flex-col items-center justify-center animate-slide-up px-8">
                    <div className="text-left w-full max-w-lg">
                        <div className="flex items-center gap-3 mb-4 text-red-600">
                            <i className="ph-fill ph-warning-octagon text-3xl"></i>
                            <h3 className="text-xl font-medium tracking-tight">推演进程异常中止</h3>
                        </div>
                        <div className="bg-red-50 border border-red-100 p-5 rounded-xl">
                            <p className="text-sm text-red-900 font-mono break-words">{message}</p>
                        </div>
                        <p className="text-xs text-base-500 mt-4">请检查本地后端终端日志，获取详细的大模型接口报错追踪信息。</p>
                    </div>
                </div>
            );
        }

        // --- Component: Thinking State ---
        function ThinkingState() {
            const steps = ['解析客户意图...', '切分原子功能点...', '评估能力边界...', '生成技术方案...'];
            const [stepIdx, setStepIdx] = React.useState(0);
            React.useEffect(() => {
                const t = setInterval(() => setStepIdx(i => (i + 1) % steps.length), 2000);
                return () => clearInterval(t);
            }, []);
            return (
                <div className="h-full w-full flex flex-col items-center justify-center text-base-800 animate-slide-up gap-12">
                    {/* Breathing Orb with Ripple Rings */}
                    <div className="relative flex items-center justify-center w-48 h-48">
                        <div className="absolute w-48 h-48 rounded-full border border-accent/10 animate-ping" style={{ animationDuration: '2.4s' }}></div>
                        <div className="absolute w-36 h-36 rounded-full border border-accent/15 animate-ping" style={{ animationDuration: '2s', animationDelay: '0.4s' }}></div>
                        <div className="absolute w-24 h-24 rounded-full border border-accent/20 animate-ping" style={{ animationDuration: '1.6s', animationDelay: '0.8s' }}></div>
                        {/* Core */}
                        <div className="w-14 h-14 rounded-full bg-accent shadow-[0_0_40px_rgba(67,56,202,0.4)] animate-pulse flex items-center justify-center">
                            <i className="ph-fill ph-sparkle text-white text-2xl"></i>
                        </div>
                    </div>

                    {/* Text Block */}
                    <div className="text-center space-y-2">
                        <h3 className="text-2xl font-light tracking-tight text-base-900">AI 正在深度思考</h3>
                        <p key={stepIdx} className="text-sm text-base-400 font-mono animate-slide-up">{steps[stepIdx]}</p>
                    </div>

                    {/* Step Pill Progress */}
                    <div className="flex gap-2 items-center">
                        {steps.map((_, i) => (
                            <div key={i} className={`h-1 rounded-full transition-all duration-700 ${i === stepIdx ? 'w-8 bg-accent' : i < stepIdx ? 'w-2 bg-accent/40' : 'w-2 bg-base-300'}`}></div>
                        ))}
                    </div>
                </div>
            );
        }


        // --- Component: Result Card ---
        function ArchitectureCard({ feature, index }) {
            const isLLM = feature.type && feature.type.includes('大模型');

            return (
                <div className={`bg-white border rounded-xl overflow-hidden shadow-sm hover:shadow-floating transition-all duration-300 mb-6 ${isLLM ? 'border-l-4 border-l-accent border-base-300' : 'border-l-4 border-l-base-800 border-base-300'}`}>
                    {/* Card Header */}
                    <div className="px-6 py-5 border-b border-base-300 flex justify-between items-center bg-base-200">
                        <div className="flex items-center gap-3">
                            <span className="font-mono text-sm text-base-400 font-medium tabular-nums">#{String(index + 1).padStart(2, '0')}</span>
                            <h4 className="text-lg font-semibold text-base-900 tracking-tight">{feature.name}</h4>
                        </div>
                        <span className={`px-3 py-1.5 text-xs font-mono tracking-wider rounded-full uppercase ${isLLM ? 'bg-accent text-white' : 'bg-base-900 text-white'}`}>
                            {feature.type}
                        </span>
                    </div>

                    {/* Card Body */}
                    <div className="flex flex-col divide-y divide-base-300">

                        {/* Row 1: Engineering — white bg */}
                        <div className="p-6 bg-white">
                            <div className="flex items-center gap-2.5 mb-5 pb-3 border-b border-base-200">
                                <i className="ph-bold ph-hard-drives text-base-700 text-lg"></i>
                                <h5 className="text-sm font-bold uppercase tracking-widest text-base-700">工程支撑层</h5>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="bg-base-100 rounded-lg p-4 border border-base-200">
                                    <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-base-600 shrink-0"></span>架构与方案设计
                                    </h6>
                                    <p className="text-base text-base-700 leading-relaxed">{feature.engineering.architecture}</p>
                                </div>
                                <div className="bg-base-100 rounded-lg p-4 border border-base-200">
                                    <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-base-600 shrink-0"></span>数据需求应用
                                    </h6>
                                    <p className="text-base text-base-700 leading-relaxed">{feature.engineering.data_requirements}</p>
                                </div>
                            </div>
                        </div>

                        {/* Row 2: LLM — soft blue-tint bg */}
                        {isLLM && feature.llm && (
                            <div className="p-6 bg-[#f5f3ff]">
                                <div className="flex items-center gap-2.5 mb-5 pb-3 border-b border-accent/20">
                                    <i className="ph-bold ph-brain text-accent text-lg"></i>
                                    <h5 className="text-sm font-bold uppercase tracking-widest text-accent">AI 智能应用层</h5>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/70 rounded-lg p-4 border border-accent/20">
                                        <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>提示词策略与预期效果
                                        </h6>
                                        <p className="text-base text-base-700 leading-relaxed">{feature.llm.prompt_strategy}</p>
                                    </div>
                                    <div className="bg-white/70 rounded-lg p-4 border border-accent/20">
                                        <h6 className="text-sm font-semibold text-base-800 mb-2 flex items-center gap-2">
                                            <span className="w-1.5 h-1.5 rounded-full bg-accent shrink-0"></span>AI能力与知识库支撑
                                        </h6>
                                        <p className="text-base text-base-700 leading-relaxed">{feature.llm.ai_capabilities}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Row 3: Consultant Advice — amber tint bg */}
                        {feature.consultant_advice && (
                            <div className="p-6 bg-amber-50">
                                <div className="flex gap-3.5">
                                    <div className="mt-1 shrink-0">
                                        <i className="ph-fill ph-lightbulb text-amber-500 text-2xl"></i>
                                    </div>
                                    <div>
                                        <h6 className="text-sm font-bold uppercase tracking-widest text-amber-700 mb-2">顾问策略指引</h6>
                                        <p className="text-base text-amber-900 leading-relaxed font-normal">{feature.consultant_advice}</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- Component: Feedback Modal ---
        function FeedbackModal({ isOpen, onClose }) {
            const [feedback, setFeedback] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            if (!isOpen) return null;

            const handleSaveFeedback = async () => {
                if (!feedback.trim()) return;
                setIsSubmitting(true);
                try {
                    const response = await fetch(`${API_BASE}/api/feedback`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ feedback })
                    });
                    if (response.ok) {
                        alert('反馈已保存至 [意见反馈文件.txt]\n\n感谢您为个人品牌建设提供的宝贵建议！');
                        setFeedback('');
                        onClose();
                    }
                } catch (err) {
                    console.error("Feedback failed:", err);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-base-900/60 backdrop-blur-md animate-fade-in">
                    <div className="w-full max-w-lg glass-panel rounded-3xl shadow-popover overflow-hidden border-0 animate-slide-up">
                        <div className="p-8 border-b border-base-200 flex justify-between items-center bg-gradient-to-r from-accent/5 to-transparent">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-accent flex items-center justify-center text-white shadow-lg">
                                    <i className="ph-fill ph-chat-centered-text text-xl"></i>
                                </div>
                                <div>
                                    <h3 className="font-black text-base-900 text-lg italic tracking-tight uppercase">意见反馈 / Feedback</h3>
                                    <p className="text-[10px] font-mono text-base-400 uppercase tracking-widest">Personal Logic Protocol</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-base-200 rounded-full transition-colors">
                                <i className="ph ph-x text-lg"></i>
                            </button>
                        </div>

                        <div className="p-8 space-y-6">
                            <p className="text-sm text-base-600 leading-relaxed font-medium">
                                您的每一条修正建议都将直接注入后台核心知识库，帮助我们共同构建更精准的任务拆解逻辑与智库经验沉淀。
                            </p>
                            <textarea
                                className="w-full p-5 bg-white/50 border border-base-200 rounded-2xl text-sm focus:ring-4 focus:ring-accent/10 focus:border-accent outline-none placeholder-base-400 resize-none h-44 transition-all shadow-inner font-medium"
                                placeholder="请输入您的宝贵建议或业务逻辑修正点..."
                                value={feedback}
                                onChange={(e) => setFeedback(e.target.value)}
                            ></textarea>
                            <button
                                onClick={handleSaveFeedback}
                                disabled={isSubmitting}
                                className={`w-full flex items-center justify-center gap-3 bg-base-900 hover:bg-accent text-white text-sm font-bold py-4 rounded-2xl transition-all shadow-xl active:scale-95 ${isSubmitting ? 'opacity-50 cursor-not-allowed' : ''}`}
                            >
                                <i className={`ph-bold ${isSubmitting ? 'ph-circle-notch animate-spin' : 'ph-paper-plane-right'} text-lg`}></i>
                                <span>{isSubmitting ? '沉淀中...' : '提交反馈并同步知识库'}</span>
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Main App ---
        function App() {
            const [inputState, setInputState] = useState('');
            const [isThinking, setIsThinking] = useState(false);
            const [currentOutput, setCurrentOutput] = useState(null);
            const [error, setError] = useState(null);
            const [isFeedbackOpen, setIsFeedbackOpen] = useState(false);
            const [pollingStatus, setPollingStatus] = useState(null); // 'processing', 'completed', 'failed'

            const pollTaskStatus = async (taskId) => {
                const interval = setInterval(async () => {
                    try {
                        const response = await fetch(STATUS_ENDPOINT(taskId));
                        if (!response.ok) throw new Error("Failed to fetch task status");

                        const data = await response.json();

                        if (data.status === 'completed') {
                            clearInterval(interval);
                            setCurrentOutput(data.result);
                            setIsThinking(false);
                            setPollingStatus('completed');
                        } else if (data.status === 'failed') {
                            clearInterval(interval);
                            throw new Error(data.error || "Background task failed");
                        }
                        // If still 'processing', do nothing and wait for next interval
                    } catch (err) {
                        clearInterval(interval);
                        console.error("Polling Error:", err);
                        setError(`Analysis failed during background processing. \nTrace: ${err.message}`);
                        setIsThinking(false);
                        setPollingStatus('failed');
                    }
                }, 2000); // Poll every 2 seconds
            };

            const handleAnalyze = async () => {
                if (!inputState.trim()) return;
                setIsThinking(true);
                setCurrentOutput(null);
                setError(null);
                setPollingStatus('processing');

                try {
                    const response = await fetch(API_ENDPOINT, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ requirement: inputState })
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.detail || `Server error (${response.status})`);
                    }

                    const initialData = await response.json();
                    if (initialData.task_id) {
                        // Start polling for results
                        pollTaskStatus(initialData.task_id);
                    } else {
                        throw new Error("Invalid response: missing task_id");
                    }
                } catch (err) {
                    console.error("Initiation Failed:", err);
                    setError(window.location.protocol === 'file:'
                        ? `Connection failed. Ensure local backend is running (port 8000). \nTrace: ${err.message}`
                        : `Service currently unavailable. The AI engine might be congested. \nTrace: ${err.message}`);
                    setIsThinking(false);
                    setPollingStatus('failed');
                }
            };

            const downloadMarkdown = () => {
                if (!currentOutput) return;

                let mdContent = `# 架构智能拆解报告\n\n> ${currentOutput.disclaimer || '此报告仅供参考。'}\n\n`;

                if (currentOutput.features) {
                    currentOutput.features.forEach((f, i) => {
                        mdContent += `## ${i + 1}. ${f.name} [${f.type}]\n\n`;
                        mdContent += `### 工程支撑层\n- **方案设计**: ${f.engineering.architecture}\n- **数据需求**: ${f.engineering.data_requirements}\n\n`;
                        if (f.llm) {
                            mdContent += `### AI 智能应用层\n- **Prompt 策略**: ${f.llm.prompt_strategy}\n- **知识库支撑**: ${f.llm.ai_capabilities}\n\n`;
                        }
                        mdContent += `### 顾问策略指引\n> ${f.consultant_advice}\n\n---\n\n`;
                    });
                }

                const blob = new Blob([mdContent], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Consultant_Report_${new Date().toISOString().split('T')[0]}.md`;
                a.click();
            };

            return (
                <div className="flex flex-col h-full w-full bg-[#fafafa]">
                    <Navbar />

                    <div id="main-workflow" className="flex-1 flex gap-8 overflow-hidden px-12 py-10 max-w-full mx-auto w-full">
                        <InputTerminal
                            inputState={inputState}
                            setInputState={setInputState}
                            onAnalyze={handleAnalyze}
                            isThinking={isThinking}
                        />

                        {/* Main Content Area */}
                        <div className="flex-1 h-full overflow-y-auto overflow-x-hidden pr-4 pb-8 scroll-smooth">
                            <div className="min-h-full max-w-full align-top">

                                {!currentOutput && !isThinking && !error && <EmptyState />}

                                {error && !isThinking && <ErrorState message={error} />}

                                {isThinking && <ThinkingState />}

                                {currentOutput && !isThinking && (
                                    <div className="pt-2 px-2 lg:px-6 animate-slide-up">
                                        <div className="mb-10 pb-6 border-b-2 border-base-900 flex justify-between items-end">
                                            <div>
                                                <h2 className="text-4xl font-black tracking-tighter mb-1 italic">架构智能图谱<span className="text-base-400 font-light">与拆解报告</span></h2>
                                                <p className="text-[10px] font-mono text-base-500 uppercase tracking-[0.4em]">System Decomposition Protocol v3.5</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                <button
                                                    onClick={downloadMarkdown}
                                                    className="group flex items-center gap-2 px-4 py-2.5 rounded-xl bg-base-900 text-white hover:bg-accent transition-all shadow-lg active:scale-95"
                                                    title="下载 Markdown 报告"
                                                >
                                                    <i className="ph-bold ph-file-text text-xl group-hover:scale-110"></i>
                                                    <span className="text-[11px] font-bold uppercase tracking-wider">Export MD</span>
                                                </button>
                                                <i className="ph-thin ph-stack text-5xl text-base-200 hidden lg:block"></i>
                                            </div>
                                        </div>

                                        <div className="space-y-4">
                                            {currentOutput.features && currentOutput.features.length > 0 ? (
                                                currentOutput.features.map((feature, index) => (
                                                    <ArchitectureCard key={feature.id || index} feature={feature} index={index} />
                                                ))
                                            ) : (
                                                <p className="text-base-500 italic">未能从大模型返回信息中解析到有效特征点。</p>
                                            )}
                                        </div>

                                        {currentOutput.disclaimer && (
                                            <div className="mt-16 pt-6 border-t border-base-300 text-center">
                                                <p className="text-xs font-mono text-base-400 max-w-xl mx-auto">
                                                    <i className="ph-fill ph-warning-circle inline-block mr-1 align-text-bottom"></i>
                                                    {currentOutput.disclaimer}
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>

                    <Footer onOpenFeedback={() => setIsFeedbackOpen(true)} />
                    <FeedbackModal isOpen={isFeedbackOpen} onClose={() => setIsFeedbackOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
